<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
  <meta name="theme-color" content="#1B2A4A">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  
  <title>Embarquement — Navette Express Chauffeur</title>
  <meta name="description" content="Confirmation embarquement passager - Navette Express Chauffeur">
  
  <!-- Favicon -->
  <link rel="icon" type="image/png" href="images/logo/icon-32x32.png">
  <link rel="apple-touch-icon" href="images/logo/icon-192x192.png">
  
  <!-- PWA -->
  <link rel="manifest" href="manifest.json">
  
  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  
  <!-- Styles -->
  <link rel="stylesheet" href="css/app.css">
</head>
<body class="page-embarquement">

  <!-- Bouton urgence flottant -->
  <a href="tel:+2250703285359" class="btn-urgence-float" aria-label="Appel urgence">
    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
      <path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7A2 2 0 0 1 22 16.92z"/>
    </svg>
  </a>

  <!-- Header -->
  <header class="app-header">
    <a href="passagers.html" class="header-back" aria-label="Retour">
      <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <line x1="19" y1="12" x2="5" y2="12"/>
        <polyline points="12 19 5 12 12 5"/>
      </svg>
    </a>
    <h1 class="header-title">Confirmer l'embarquement</h1>
  </header>

  <!-- Contenu principal -->
  <main class="app-content">

    <!-- Carte passager -->
    <section class="passager-card-section">
      <div class="passager-card-large">
        
        <!-- Avatar -->
        <div class="passager-avatar-large">
          <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
            <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
            <circle cx="12" cy="7" r="4"/>
          </svg>
        </div>

        <!-- Informations passager -->
        <div class="passager-details-large">
          <h2 class="passager-nom-large">Diallo Fatoumata</h2>
          
          <div class="detail-row">
            <div class="detail-item">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <rect x="4" y="4" width="16" height="16" rx="2"/>
                <path d="M9 9h6"/>
                <path d="M9 13h6"/>
                <path d="M9 17h4"/>
              </svg>
              <span class="detail-label">Siège</span>
              <span class="detail-value">8C</span>
            </div>
            <div class="detail-item">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/>
                <circle cx="12" cy="10" r="3"/>
              </svg>
              <span class="detail-label">Arrêt</span>
              <span class="detail-value">Riviera 2</span>
            </div>
          </div>

          <div class="detail-row">
            <div class="detail-item full-width">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7A2 2 0 0 1 22 16.92z"/>
              </svg>
              <span class="detail-label">Téléphone</span>
              <a href="tel:+2250708123456" class="detail-value phone-link">+225 07 08 12 34 56</a>
            </div>
          </div>

        </div>

        <!-- Statut actuel -->
        <div class="passager-statut-actuel attente">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <circle cx="12" cy="12" r="10"/>
            <polyline points="12 6 12 12 16 14"/>
          </svg>
          <span>En attente d'embarquement</span>
        </div>

      </div>
    </section>

    <!-- QR Code section -->
    <section class="qr-section">
      <div class="qr-card">
        <h3 class="qr-title">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <rect x="3" y="3" width="7" height="7"/>
            <rect x="14" y="3" width="7" height="7"/>
            <rect x="3" y="14" width="7" height="7"/>
            <rect x="14" y="14" width="7" height="7"/>
          </svg>
          Code de réservation
        </h3>
        <div class="qr-code-placeholder">
          <svg width="120" height="120" viewBox="0 0 120 120" fill="none">
            <!-- QR Code simplifié -->
            <rect x="10" y="10" width="30" height="30" fill="currentColor"/>
            <rect x="80" y="10" width="30" height="30" fill="currentColor"/>
            <rect x="10" y="80" width="30" height="30" fill="currentColor"/>
            <rect x="15" y="15" width="20" height="20" fill="var(--fond-sombre)"/>
            <rect x="85" y="15" width="20" height="20" fill="var(--fond-sombre)"/>
            <rect x="15" y="85" width="20" height="20" fill="var(--fond-sombre)"/>
            <rect x="20" y="20" width="10" height="10" fill="currentColor"/>
            <rect x="90" y="20" width="10" height="10" fill="currentColor"/>
            <rect x="20" y="90" width="10" height="10" fill="currentColor"/>
            <rect x="50" y="10" width="8" height="8" fill="currentColor"/>
            <rect x="50" y="25" width="8" height="8" fill="currentColor"/>
            <rect x="62" y="10" width="8" height="8" fill="currentColor"/>
            <rect x="50" y="50" width="20" height="20" fill="currentColor"/>
            <rect x="10" y="50" width="8" height="8" fill="currentColor"/>
            <rect x="25" y="50" width="8" height="8" fill="currentColor"/>
            <rect x="50" y="80" width="8" height="8" fill="currentColor"/>
            <rect x="80" y="50" width="8" height="8" fill="currentColor"/>
            <rect x="95" y="50" width="8" height="8" fill="currentColor"/>
            <rect x="80" y="80" width="8" height="8" fill="currentColor"/>
            <rect x="95" y="95" width="8" height="8" fill="currentColor"/>
          </svg>
        </div>
        <span class="qr-code-ref">REF: NE-2025-003847</span>
      </div>
    </section>

    <!-- Boutons d'action -->
    <section class="embarquement-actions">
      
      <!-- Confirmer embarquement -->
      <button class="btn btn-success btn-confirmer btn-action-large">
        <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
          <path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/>
          <polyline points="22 4 12 14.01 9 11.01"/>
        </svg>
        <span>Confirmer l'embarquement</span>
      </button>

      <!-- Scanner QR -->
      <button class="btn btn-secondary btn-scanner btn-action-large">
        <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M3 7V5a2 2 0 0 1 2-2h2"/>
          <path d="M17 3h2a2 2 0 0 1 2 2v2"/>
          <path d="M21 17v2a2 2 0 0 1-2 2h-2"/>
          <path d="M7 21H5a2 2 0 0 1-2-2v-2"/>
          <rect x="7" y="7" width="10" height="10" rx="1"/>
        </svg>
        <span>Scanner le QR code</span>
      </button>

      <!-- Passager absent -->
      <button class="btn btn-danger btn-absent btn-action-large">
        <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <circle cx="12" cy="12" r="10"/>
          <line x1="15" y1="9" x2="9" y2="15"/>
          <line x1="9" y1="9" x2="15" y2="15"/>
        </svg>
        <span>Passager absent</span>
      </button>

    </section>

    <!-- Contact passager -->
    <section class="contact-passager-section">
      <a href="tel:+2250708123456" class="btn btn-outline btn-contact-passager">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7A2 2 0 0 1 22 16.92z"/>
        </svg>
        <span>Appeler le passager</span>
      </a>
    </section>

  </main>

  <!-- Navigation bottom -->
  <nav class="bottom-nav">
    <a href="accueil.html" class="nav-item" aria-label="Accueil">
      <svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <rect x="3" y="3" width="7" height="9"/>
        <rect x="14" y="3" width="7" height="5"/>
        <rect x="14" y="12" width="7" height="9"/>
        <rect x="3" y="16" width="7" height="5"/>
      </svg>
      <span>Accueil</span>
    </a>
    
    <a href="itineraire.html" class="nav-item" aria-label="Itinéraire">
      <svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <circle cx="12" cy="12" r="10"/>
        <polygon points="16.24 7.76 14.12 14.12 7.76 16.24 9.88 9.88 16.24 7.76"/>
      </svg>
      <span>Itinéraire</span>
    </a>
    
    <a href="passagers.html" class="nav-item active" aria-label="Passagers">
      <svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/>
        <circle cx="9" cy="7" r="4"/>
        <path d="M23 21v-2a4 4 0 0 0-3-3.87"/>
        <path d="M16 3.13a4 4 0 0 1 0 7.75"/>
      </svg>
      <span>Passagers</span>
    </a>
    
    <a href="planning.html" class="nav-item" aria-label="Planning">
      <svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <rect x="3" y="4" width="18" height="18" rx="2"/>
        <line x1="16" y1="2" x2="16" y2="6"/>
        <line x1="8" y1="2" x2="8" y2="6"/>
        <line x1="3" y1="10" x2="21" y2="10"/>
      </svg>
      <span>Planning</span>
    </a>
    
    <a href="profil.html" class="nav-item" aria-label="Profil">
      <svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <circle cx="12" cy="12" r="10"/>
        <circle cx="12" cy="10" r="3"/>
        <path d="M7 20.662V19a2 2 0 0 1 2-2h6a2 2 0 0 1 2 2v1.662"/>
      </svg>
      <span>Profil</span>
    </a>
  </nav>

  <!-- Scripts -->
  <script src="js/app.js"></script>
</body>
</html>
