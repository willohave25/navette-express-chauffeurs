<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
  <meta name="theme-color" content="#1B2A4A">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  
  <title>Connexion — Navette Express Chauffeur</title>
  <meta name="description" content="Connexion à l'espace chauffeur Navette Express - JAEBETS HOLDING">
  
  <!-- Favicon -->
  <link rel="icon" type="image/png" href="images/logo/logo-jaebets.png">
  <link rel="apple-touch-icon" href="images/logo/logo-jaebets.png">
  
  <!-- PWA -->
  <link rel="manifest" href="manifest.json">
  
  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  
  <!-- Styles -->
  <link rel="stylesheet" href="css/app.css">
</head>
<body class="page-connexion">

  <!-- Bouton urgence flottant -->
  <a href="tel:+2250703285359" class="btn-urgence-float" aria-label="Appel urgence">
    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
      <path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7A2 2 0 0 1 22 16.92z"/>
    </svg>
  </a>

  <!-- Contenu principal -->
  <main class="connexion-container">
    
    <!-- Logo et en-tête -->
    <header class="connexion-header">
      <picture class="connexion-logo">
        <source srcset="images/logo/logo-jaebets.webp" type="image/webp">
        <img src="images/logo/logo-jaebets.png" alt="Logo JAEBETS HOLDING" width="120" height="60">
      </picture>
      
      <div class="connexion-branding">
        <h1 class="connexion-title">Connexion chauffeur</h1>
        <p class="connexion-subtitle">Navette Express — Espace Chauffeur</p>
      </div>
    </header>

    <!-- Formulaire connexion -->
    <form class="form-connexion" autocomplete="off">
      
      <!-- Champ ID employé -->
      <div class="form-group">
        <label for="employee-id" class="form-label">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <rect x="2" y="4" width="20" height="16" rx="2"/>
            <path d="M12 11a3 3 0 1 0 0-6 3 3 0 0 0 0 6z"/>
            <path d="M6 20v-1a4 4 0 0 1 4-4h4a4 4 0 0 1 4 4v1"/>
          </svg>
          ID employé
        </label>
        <input 
          type="text" 
          id="employee-id" 
          name="employee-id" 
          class="form-input" 
          placeholder="Entrez votre ID employé"
          autocomplete="username"
          inputmode="text"
          required
        >
      </div>

      <!-- Champ mot de passe -->
      <div class="form-group">
        <label for="password" class="form-label">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <rect x="3" y="11" width="18" height="11" rx="2"/>
            <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
            <circle cx="12" cy="16" r="1"/>
          </svg>
          Mot de passe
        </label>
        <div class="input-password-wrapper">
          <input 
            type="password" 
            id="password" 
            name="password" 
            class="form-input" 
            placeholder="Entrez votre mot de passe"
            autocomplete="current-password"
            required
          >
          <button type="button" class="toggle-password" aria-label="Afficher/masquer le mot de passe">
            <!-- Icône œil ouvert -->
            <svg class="icon-show" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
              <circle cx="12" cy="12" r="3"/>
            </svg>
            <!-- Icône œil fermé -->
            <svg class="icon-hide" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/>
              <line x1="1" y1="1" x2="23" y2="23"/>
            </svg>
          </button>
        </div>
      </div>

      <!-- Bouton connexion -->
      <button type="submit" class="btn btn-primary btn-connexion">
        <span class="btn-text">Se connecter</span>
        <span class="btn-loader">
          <svg class="spinner" width="24" height="24" viewBox="0 0 24 24">
            <circle cx="12" cy="12" r="10" stroke="currentColor" stroke-width="3" fill="none" stroke-dasharray="60" stroke-linecap="round"/>
          </svg>
        </span>
      </button>

    </form>

    <!-- Liens secondaires -->
    <div class="connexion-links">
      <a href="#" class="link-secondary" data-action="forgot-password">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <circle cx="12" cy="12" r="10"/>
          <path d="M9.09 9a3 3 0 0 1 5.83 1c0 2-3 3-3 3"/>
          <line x1="12" y1="17" x2="12.01" y2="17"/>
        </svg>
        Mot de passe oublié ?
      </a>
      
      <a href="tel:+2250703285359" class="link-secondary">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7A2 2 0 0 1 22 16.92z"/>
        </svg>
        Contacter l'administrateur
      </a>
    </div>

    <!-- Bouton installation PWA -->
    <div class="pwa-install-section" id="pwa-install-section" style="display: none;">
      <button class="btn btn-install-pwa" id="btn-install-pwa">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
          <polyline points="7 10 12 15 17 10"/>
          <line x1="12" y1="15" x2="12" y2="3"/>
        </svg>
        <span>Installer l'application</span>
      </button>
      <p class="pwa-install-hint">Accédez à l'app directement depuis votre écran d'accueil</p>
    </div>

    <!-- Footer -->
    <footer class="connexion-footer">
      <p class="slogan">Sûreté – Rapidité – Confort</p>
      <p class="copyright">© 2025 JAEBETS HOLDING — Navette Express</p>
    </footer>

  </main>

  <!-- Scripts -->
  <script src="auth-api.js"></script>
  <script src="js/app.js"></script>
  <script>
    // Gestion installation PWA
    let deferredPrompt;
    const installSection = document.getElementById('pwa-install-section');
    const installBtn = document.getElementById('btn-install-pwa');

    window.addEventListener('beforeinstallprompt', (e) => {
      e.preventDefault();
      deferredPrompt = e;
      if (installSection) {
        installSection.style.display = 'block';
      }
    });

    if (installBtn) {
      installBtn.addEventListener('click', async () => {
        if (deferredPrompt) {
          deferredPrompt.prompt();
          const { outcome } = await deferredPrompt.userChoice;
          if (outcome === 'accepted') {
            installSection.style.display = 'none';
          }
          deferredPrompt = null;
        }
      });
    }

    window.addEventListener('appinstalled', () => {
      if (installSection) {
        installSection.style.display = 'none';
      }
      deferredPrompt = null;
    });
  </script>
</body>
</html>
