      <button class="btn-semaine-nav" aria-label="Semaine suivante">

  <!-- Scripts -->
  <script src="auth-api.js"></script>
  <script src="supabase-config.js"></script>
  <script src="js/app.js"></script>
  <script>
    const JOURS_FR = ['Dimanche','Lundi','Mardi','Mercredi','Jeudi','Vendredi','Samedi'];
    const MOIS_FR = ['Jan','Fév','Mar','Avr','Mai','Jun','Jul','Aoû','Sep','Oct','Nov','Déc'];
    let currentWeekOffset = 0;

    function getWeekBounds(offset) {
      const today = new Date();
      today.setDate(today.getDate() + offset * 7);
      const dow = today.getDay();
      const monday = new Date(today);
      monday.setDate(today.getDate() - (dow === 0 ? 6 : dow - 1));
      const sunday = new Date(monday);
      sunday.setDate(monday.getDate() + 6);
      return { monday, sunday };
    }

    function formatDateShort(d) {
      return d.getDate() + ' ' + MOIS_FR[d.getMonth()];
    }

    function renderPlanning(trips, monday) {
      const container = document.getElementById('planningJours');
      const days = [];
      for (let i = 0; i < 7; i++) {
        const d = new Date(monday);
        d.setDate(monday.getDate() + i);
        days.push(d);
      }

      // Group trips by date
      const byDate = {};
      trips.forEach(t => {
        const key = (t.trip_date || t.date || '').split('T')[0];
        if (!byDate[key]) byDate[key] = [];
        byDate[key].push(t);
      });

      const today = new Date().toISOString().split('T')[0];

      container.innerHTML = days.map(d => {
        const key = d.toISOString().split('T')[0];
        const dayTrips = byDate[key] || [];
        const isToday = key === today;
        const jourNom = JOURS_FR[d.getDay()];
        const jourNum = formatDateShort(d);

        if (dayTrips.length === 0) {
          return `
          <div class="jour-planning repos" data-jour="${jourNom.toLowerCase()}">
            <div class="jour-header">
              <div class="jour-date">
                <span class="jour-nom">${jourNom}${isToday ? ' <small style="font-size:10px;color:#4CAF50;">Aujourd\'hui</small>' : ''}</span>
                <span class="jour-numero">${jourNum}</span>
              </div>
              <span class="jour-badge repos">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                  <path d="M17 18a5 5 0 0 0-10 0"/><line x1="12" y1="9" x2="12" y2="2"/>
                  <line x1="4.22" y1="10.22" x2="5.64" y2="11.64"/>
                  <line x1="1" y1="18" x2="3" y2="18"/><line x1="21" y1="18" x2="23" y2="18"/>
                  <line x1="18.36" y1="11.64" x2="19.78" y2="10.22"/>
                </svg>
                Aucun trajet
              </span>
            </div>
            <div class="jour-trajets repos-message"><p>Pas de trajet prévu</p></div>
          </div>`;
        }

        const busIcon = `<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M8 6v6M16 6v6M2 12h20M4 18h16a2 2 0 0 0 2-2V6a2 2 0 0 0-2-2H4a2 2 0 0 0-2 2v10a2 2 0 0 0 2 2z"/></svg>`;

        const trajetsHtml = dayTrips.map(t => {
          const dep = (t.departure_time || t.heure_depart || '').substring(0,5);
          const arr = (t.arrival_time || t.heure_arrivee || '').substring(0,5);
          const ligne = t.line?.name || t.ligne?.name || t.nom_ligne || 'Ligne inconnue';
          const bus = t.vehicle?.plate_number || t.bus?.plate_number || t.immatriculation || '-';
          return `
          <div class="trajet-item">
            <div class="trajet-horaire">
              <span class="heure-depart">${dep}</span>
              <span class="heure-separator">→</span>
              <span class="heure-arrivee">${arr}</span>
            </div>
            <div class="trajet-details">
              <span class="trajet-ligne">Ligne : ${ligne}</span>
              <span class="trajet-bus">${busIcon} Bus : ${bus}</span>
            </div>
          </div>`;
        }).join('');

        return `
        <div class="jour-planning" data-jour="${jourNom.toLowerCase()}">
          <div class="jour-header">
            <div class="jour-date">
              <span class="jour-nom">${jourNom}${isToday ? ' <small style="font-size:10px;color:#4CAF50;">Aujourd\'hui</small>' : ''}</span>
              <span class="jour-numero">${jourNum}</span>
            </div>
            <span class="jour-badge trajets">${dayTrips.length} trajet${dayTrips.length > 1 ? 's' : ''}</span>
          </div>
          <div class="jour-trajets">${trajetsHtml}</div>
        </div>`;
      }).join('');
    }

    async function chargerPlanning(offset) {
      const container = document.getElementById('planningJours');
      container.innerHTML = '<div style="text-align:center;padding:32px;color:#888;">Chargement...</div>';

      const { monday, sunday } = getWeekBounds(offset);
      const dateLabel = formatDateShort(monday) + ' – ' + formatDateShort(sunday) + ' ' + sunday.getFullYear();
      document.getElementById('semaine-dates').textContent = dateLabel;

      const user = window.NavetteAuth ? NavetteAuth.getUser() : null;
      const driverId = user?.driver_id || null;
      if (!driverId) {
        container.innerHTML = '<div style="text-align:center;padding:32px;color:#888;">Identifiant chauffeur non trouvé.</div>';
        return;
      }

      try {
        const result = await NavetteAPI.getPlanningHebdo(driverId, offset);
        if (!result.success) throw new Error(result.error || 'Erreur API');
        renderPlanning(result.data || [], monday);
      } catch(e) {
        container.innerHTML = `<div style="text-align:center;padding:32px;color:#e74c3c;">Impossible de charger le planning : ${e.message}</div>`;
      }
    }

    document.addEventListener('DOMContentLoaded', function() {
      chargerPlanning(0);

      const navBtns = document.querySelectorAll('.btn-semaine-nav');
      if (navBtns[0]) navBtns[0].addEventListener('click', function() {
        currentWeekOffset--;
        chargerPlanning(currentWeekOffset);
      });
      if (navBtns[1]) navBtns[1].addEventListener('click', function() {
        currentWeekOffset++;
        chargerPlanning(currentWeekOffset);
      });
    });
  </script>
</body>
