<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">

  <meta name="apple-mobile-web-app-capable" content="yes">

  <meta name="description" content="Liste des passagers du trajet - Navette Express Chauffeur">

  <link rel="icon" type="image/png" href="images/logo/logo-jaebets.png">
  <link rel="apple-touch-icon" href="images/logo/logo-jaebets.png">
  
  <!-- PWA -->
  <link rel="manifest" href="manifest.json">
  
  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  
  <!-- Styles -->
  <link rel="stylesheet" href="css/app.css">
</head>
<body class="page-passagers">

  <!-- Bouton urgence flottant -->
  <a href="tel:+2250703285359" class="btn-urgence-float" aria-label="Appel urgence">
    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
      <path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7A2 2 0 0 1 22 16.92z"/>
    </svg>
  </a>

  <!-- Header -->
  <header class="app-header">
    <a href="accueil.html" class="header-back" aria-label="Retour">
      <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <line x1="19" y1="12" x2="5" y2="12"/>
        <polyline points="12 19 5 12 12 5"/>
      </svg>
    </a>
    <h1 class="header-title">Liste des passagers</h1>
    <span class="header-badge">28</span>
  </header>

  <!-- Contenu principal -->
  <main class="app-content">

    <!-- Résumé statuts -->
    <section class="passagers-summary">
      <div class="summary-item embarque">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/>
          <polyline points="22 4 12 14.01 9 11.01"/>
        </svg>
        <span class="summary-count" id="countEmbarque">0</span>
        <span class="summary-label">Embarqués</span>
      </div>
      <div class="summary-item attente">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <circle cx="12" cy="12" r="10"/>
          <polyline points="12 6 12 12 16 14"/>
        </svg>
        <span class="summary-count" id="countAttente">0</span>
        <span class="summary-label">En attente</span>
      </div>
      <div class="summary-item absent">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <circle cx="12" cy="12" r="10"/>
          <line x1="15" y1="9" x2="9" y2="15"/>
          <line x1="9" y1="9" x2="15" y2="15"/>
        </svg>
        <span class="summary-count" id="countAbsent">0</span>
        <span class="summary-label">Absents</span>
      </div>
    </section>

    <!-- Barre de recherche -->
    <section class="search-section">
      <div class="search-wrapper">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <circle cx="11" cy="11" r="8"/>
          <line x1="21" y1="21" x2="16.65" y2="16.65"/>
        </svg>
        <input 
          type="search" 
          class="search-passager" 
          placeholder="Rechercher un passager..."
          inputmode="search"
        >
      </div>
    </section>

    <!-- Actions groupées -->
    <section class="group-actions">
      <button class="btn btn-secondary btn-confirmer-tous">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/>
          <polyline points="22 4 12 14.01 9 11.01"/>
        </svg>
        <span>Confirmer tous</span>
      </button>
    </section>

    <!-- Liste des passagers -->
    <section class="passagers-list-section">
      <h2 class="section-title">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/>
          <circle cx="9" cy="7" r="4"/>
          <path d="M23 21v-2a4 4 0 0 0-3-3.87"/>
          <path d="M16 3.13a4 4 0 0 1 0 7.75"/>
        </svg>
        Nombre de passagers : <span class="passagers-count" id="passagersCount">0</span>
      </h2>

      <div class="passagers-list" id="passagersList">
        <div style="text-align:center;padding:32px;color:#888;">Chargement des passagers...</div>
      </div>
    </section>

  </main>

  <!-- Navigation bottom -->
  <nav class="bottom-nav">
    <a href="accueil.html" class="nav-item" aria-label="Accueil">
      <svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <rect x="3" y="3" width="7" height="9"/>
        <rect x="14" y="3" width="7" height="5"/>
        <rect x="14" y="12" width="7" height="9"/>
        <rect x="3" y="16" width="7" height="5"/>
      </svg>
      <span>Accueil</span>
    </a>
    
    <a href="itineraire.html" class="nav-item" aria-label="Itinéraire">
      <svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <circle cx="12" cy="12" r="10"/>
        <polygon points="16.24 7.76 14.12 14.12 7.76 16.24 9.88 9.88 16.24 7.76"/>
      </svg>
      <span>Itinéraire</span>
    </a>
    
    <a href="passagers.html" class="nav-item active" aria-label="Passagers">
      <svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/>
        <circle cx="9" cy="7" r="4"/>
        <path d="M23 21v-2a4 4 0 0 0-3-3.87"/>
        <path d="M16 3.13a4 4 0 0 1 0 7.75"/>
      </svg>
      <span>Passagers</span>
    </a>
    
    <a href="planning.html" class="nav-item" aria-label="Planning">
      <svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <rect x="3" y="4" width="18" height="18" rx="2"/>
        <line x1="16" y1="2" x2="16" y2="6"/>
        <line x1="8" y1="2" x2="8" y2="6"/>
        <line x1="3" y1="10" x2="21" y2="10"/>
      </svg>
      <span>Planning</span>
    </a>
    
    <a href="profil.html" class="nav-item" aria-label="Profil">
      <svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <circle cx="12" cy="12" r="10"/>
        <circle cx="12" cy="10" r="3"/>
        <path d="M7 20.662V19a2 2 0 0 1 2-2h6a2 2 0 0 1 2 2v1.662"/>
      </svg>
      <span>Profil</span>
    </a>
  </nav>

  <!-- Scripts -->
  <script src="auth-api.js"></script>
  <script src="supabase-config.js"></script>
  <script src="js/app.js"></script>
  <script>
    const avatarSvg = `<svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>`;

    function statusInfo(s) {
      if (s === 'boarded' || s === 'embarque') return { cls: 'embarque', label: 'Embarqué', icon: '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><polyline points="20 6 9 17 4 12"/></svg>' };
      if (s === 'absent') return { cls: 'absent', label: 'Absent', icon: '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>' };
      return { cls: 'attente', label: 'En attente', icon: '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>' };
    }

    function renderPassagers(passagers) {
      const list = document.getElementById('passagersList');
      const badge = document.querySelector('.header-badge');

      let embarque = 0, attente = 0, absent = 0;
      passagers.forEach(p => {
        const s = p.boarding_status || p.statut_embarquement || 'waiting';
        if (s === 'boarded' || s === 'embarque') embarque++;
        else if (s === 'absent') absent++;
        else attente++;
      });

      document.getElementById('countEmbarque').textContent = embarque;
      document.getElementById('countAttente').textContent = attente;
      document.getElementById('countAbsent').textContent = absent;
      document.getElementById('passagersCount').textContent = passagers.length;
      if (badge) badge.textContent = passagers.length;

      if (passagers.length === 0) {
        list.innerHTML = '<div style="text-align:center;padding:32px;color:#888;">Aucun passager pour ce trajet.</div>';
        return;
      }

      list.innerHTML = passagers.map(p => {
        const nom = p.user?.full_name || p.passager?.full_name || p.nom || 'Passager';
        const siege = p.seat_number || p.siege || '-';
        const stop = p.stop?.name || '';
        const s = p.boarding_status || p.statut_embarquement || 'waiting';
        const si = statusInfo(s);
        return `
        <a href="embarquement.html?id=${p.id}" class="passager-item ${si.cls}" data-id="${p.id}">
          <div class="passager-avatar">${avatarSvg}</div>
          <div class="passager-info">
            <span class="passager-nom">${nom}</span>
            <span class="passager-details">Siège ${siege}${stop ? ' • ' + stop : ''}</span>
          </div>
          <div class="passager-status">
            <span class="status-badge status-${si.cls}">${si.icon} ${si.label}</span>
          </div>
        </a>`;
      }).join('');

      // Search filter
      const searchInput = document.querySelector('.search-passager');
      if (searchInput) {
        searchInput.addEventListener('input', function() {
          const q = this.value.toLowerCase();
          document.querySelectorAll('.passager-item').forEach(item => {
            item.style.display = item.textContent.toLowerCase().includes(q) ? 'flex' : 'none';
          });
        });
      }

      // Confirm all button
      const confirmBtn = document.querySelector('.btn-confirmer-tous');
      if (confirmBtn) {
        confirmBtn.addEventListener('click', async function() {
          const items = document.querySelectorAll('.passager-item:not(.embarque)');
          for (const item of items) {
            const id = item.dataset.id;
            if (id) await NavetteAPI.updateEmbarquement(id, 'embarque');
          }
          chargerPassagers();
        });
      }
    }

    async function chargerPassagers() {
      const urlParams = new URLSearchParams(window.location.search);
      let tripId = urlParams.get('trip_id');

      if (!tripId) {
        // Try to get first today's trip
        const user = NavetteAuth.getUser();
        const driverId = user?.driver_id;
        if (driverId) {
          const trips = await NavetteAPI.getTrajetsJour(driverId);
          if (trips.success && trips.data.length > 0) tripId = trips.data[0].id;
        }
      }

      if (!tripId) {
        document.getElementById('passagersList').innerHTML = '<div style="text-align:center;padding:32px;color:#888;">Aucun trajet actif trouvé. Passez par l\'accueil.</div>';
        return;
      }

      try {
        const result = await NavetteAPI.getPassagers(tripId);
        if (!result.success) throw new Error(result.error || 'Erreur API');
        renderPassagers(result.data || []);
      } catch(e) {
        document.getElementById('passagersList').innerHTML = `<div style="text-align:center;padding:32px;color:#e74c3c;">Erreur : ${e.message}</div>`;
      }
    }

    document.addEventListener('DOMContentLoaded', chargerPassagers);
  </script>
</body>
</html>
