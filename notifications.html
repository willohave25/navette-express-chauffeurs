    </svg>

  <!-- Header -->
  <header class="app-header">
    <a href="accueil.html" class="header-back" aria-label="Retour">
      <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <line x1="19" y1="12" x2="5" y2="12"/>
        <polyline points="12 19 5 12 12 5"/>
      </svg>
    </a>
    <h1 class="header-title">Notifications</h1>
    <button class="header-btn mark-all-read" aria-label="Tout marquer comme lu">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">

        <polyline points="22 4 12 14.01 9 11.01"/>
      </svg>
    </button>
  </header>

  <!-- Contenu principal -->
  <main class="app-content">

    <!-- Filtres notifications -->
    <section class="notifications-filters">
      <button class="filter-btn active" data-filter="all">Toutes</button>
      <button class="filter-btn" data-filter="unread">Non lues</button>
      <button class="filter-btn" data-filter="assignation">Assignations</button>
      <button class="filter-btn" data-filter="alerte">Alertes</button>
    </section>

    <!-- Liste des notifications -->
    <section class="notifications-list" id="notificationsList">
      <div style="text-align:center;padding:32px;color:#888;">Chargement des notifications...</div>
    </section>

    <!-- État vide (caché par défaut) -->
    <section class="empty-state hidden" id="empty-notifications">
      <div class="empty-icon">
        <svg width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
          <path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/>
          <path d="M13.73 21a2 2 0 0 1-3.46 0"/>
        </svg>
      </div>
      <h2 class="empty-title">Aucune notification à afficher.</h2>
      <p class="empty-text">Vous recevrez ici les alertes, assignations et messages importants.</p>
    </section>

  </main>

  <!-- Navigation bottom -->
  <nav class="bottom-nav">
    <a href="accueil.html" class="nav-item" aria-label="Accueil">
      <svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <rect x="3" y="3" width="7" height="9"/>

      <span>Accueil</span>
    </a>
    
    <a href="itineraire.html" class="nav-item" aria-label="Itinéraire">
      <svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <circle cx="12" cy="12" r="10"/>
        <polygon points="16.24 7.76 14.12 14.12 7.76 16.24 9.88 9.88 16.24 7.76"/>
      </svg>
      <span>Itinéraire</span>
    </a>
    
    <a href="passagers.html" class="nav-item" aria-label="Passagers">
      <svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/>
        <circle cx="9" cy="7" r="4"/>
        <path d="M23 21v-2a4 4 0 0 0-3-3.87"/>
        <path d="M16 3.13a4 4 0 0 1 0 7.75"/>
      </svg>
      <span>Passagers</span>
    </a>
    
    <a href="planning.html" class="nav-item" aria-label="Planning">
      <svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <rect x="3" y="4" width="18" height="18" rx="2"/>
        <line x1="16" y1="2" x2="16" y2="6"/>
        <line x1="8" y1="2" x2="8" y2="6"/>
        <line x1="3" y1="10" x2="21" y2="10"/>

      <span>Planning</span>

    <a href="profil.html" class="nav-item" aria-label="Profil">
      <svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <circle cx="12" cy="12" r="10"/>
        <circle cx="12" cy="10" r="3"/>

  </nav>

  <!-- Scripts -->
  <script src="auth-api.js"></script>
  <script src="supabase-config.js"></script>
  <script src="js/app.js"></script>
  <script>
    let allNotifs = [];

    function timeAgo(dateStr) {
      if (!dateStr) return '';
      const d = new Date(dateStr);
      const now = new Date();
      const diff = Math.floor((now - d) / 1000);
      if (diff < 60) return 'À l\'instant';
      if (diff < 3600) return 'Il y a ' + Math.floor(diff/60) + ' min';
      if (diff < 86400) return 'Il y a ' + Math.floor(diff/3600) + ' h';
      if (diff < 172800) return 'Hier';
      return d.toLocaleDateString('fr-FR', { day: 'numeric', month: 'short' });
    }

    function typeFromNotif(n) {
      const t = (n.type || n.notification_type || '').toLowerCase();
      if (t.includes('assign')) return 'assignation';
      if (t.includes('alerte') || t.includes('alert')) return 'alerte';
      return 'message';
    }

    function renderNotifications(notifs, filter = 'all') {
      const list = document.getElementById('notificationsList');
      const emptyState = document.getElementById('empty-notifications');

      let filtered = notifs;
      if (filter === 'unread') filtered = notifs.filter(n => !n.is_read && !n.lue);
      else if (filter !== 'all') filtered = notifs.filter(n => typeFromNotif(n) === filter);

      if (filtered.length === 0) {
        list.innerHTML = '';
        if (emptyState) emptyState.classList.remove('hidden');
        return;
      }
      if (emptyState) emptyState.classList.add('hidden');

      list.innerHTML = filtered.map(n => {
        const isRead = n.is_read || n.lue;
        const type = typeFromNotif(n);
        const title = n.title || n.titre || 'Notification';
        const body = n.body || n.message || n.content || '';
        const time = timeAgo(n.created_at || n.date_creation);
        return `
        <div class="notification-item ${isRead ? 'read' : 'unread'}" data-type="${type}" data-id="${n.id}" onclick="marquerLue(this)">
          <div class="notification-icon ${type}">
            <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/>
            </svg>
          </div>
          <div class="notification-content">
            <span class="notification-title">${title}</span>
            <p class="notification-text">${body}</p>
            <span class="notification-time">${time}</span>
          </div>
          ${!isRead ? '<div class="notification-indicator"></div>' : ''}
        </div>`;
      }).join('');
    }

    async function marquerLue(el) {
      const id = el.dataset.id;
      if (id && el.classList.contains('unread')) {
        el.classList.remove('unread');
        el.classList.add('read');
        const indicator = el.querySelector('.notification-indicator');
        if (indicator) indicator.remove();
        await NavetteAPI.markNotificationRead(id).catch(() => {});
      }
    }

    document.addEventListener('DOMContentLoaded', async function() {
      // Load notifications
      try {
        const result = await NavetteAPI.getNotifications();
        if (result.success) {
          allNotifs = result.data || [];
          renderNotifications(allNotifs, 'all');
        } else {
          document.getElementById('notificationsList').innerHTML = '<div style="text-align:center;padding:32px;color:#888;">Aucune notification.</div>';
        }
      } catch(e) {
        document.getElementById('notificationsList').innerHTML = `<div style="text-align:center;padding:32px;color:#e74c3c;">Erreur : ${e.message}</div>`;
      }

      // Filters
      const filterBtns = document.querySelectorAll('.filter-btn');
      filterBtns.forEach(btn => {
        btn.addEventListener('click', function() {
          filterBtns.forEach(b => b.classList.remove('active'));
          this.classList.add('active');
          renderNotifications(allNotifs, this.dataset.filter);
        });
      });

      // Mark all read
      const markAllBtn = document.querySelector('.mark-all-read');
      if (markAllBtn) {
        markAllBtn.addEventListener('click', async function() {
          const unread = allNotifs.filter(n => !n.is_read && !n.lue);
          for (const n of unread) {
            n.is_read = true;
            await NavetteAPI.markNotificationRead(n.id).catch(() => {});
          }
          renderNotifications(allNotifs, document.querySelector('.filter-btn.active')?.dataset.filter || 'all');
        });
      }
    });
  </script>
</body>
</html>
